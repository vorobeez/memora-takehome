services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: memora
      POSTGRES_PASSWORD: memora
      POSTGRES_DB: memora
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memora -d memora"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
